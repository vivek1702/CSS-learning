<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- block elements which stack up vertically and take space accordingly -->
    <div>this is div one</div>
    <div>this is div 2</div>
    <p>this is para 1</p>
    <h1>this is h1 tag</h1>
    <footer>this one is footer tag</footer>

    <!-- in-line elemnets this stackup horizontally -->
    <span>this is span 1</span>
    <span>this is span 2</span>
    <a href="/">this is a link</a>

    <!-- using in-line inside block element -->
    <div>this is <strong>div one inside in-line</strong></div>
    <div>this is <span style="color: brown">div 2</span></div>

    <!-- we can't add width to in-line element -->

    <!-- in-line block element -->
    <div style="display: inline-block; height: 200px">
      this is display of in-line block element
    </div>
    <p style="display: inline-block; height: 200px; border: 1px solid green">
      this is paragraph
    </p>
  </body>
</html>
